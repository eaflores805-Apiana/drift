<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<title>Drift v3 score distribution by route</title>
<desc>A number line from 0 to 0.85 comparing two routes on the same v3 score scale. The community route spreads across the axis: ambient items p044 and p043 near 0.13 and 0.18, a deferred item p045 at 0.34, and voiced items p042, p041, p018 clustered near 0.53 to 0.58, with the threshold at 0.53 and a wide gap of about 0.35. The doorway route is compressed near the floor: a cross-route silent reference p016 at 0.04 and the single voiced item p004 at 0.16, with the threshold at 0.10, using almost none of the range below the strong-candidate ceiling of 0.84.</desc>
<style>
  .t  { fill:#1f1f1d; font-size:14px; font-weight:500; }
  .ts { fill:#5f5e5a; font-size:12px; font-weight:400; }
  @media (prefers-color-scheme: dark){ .t{fill:#ededeb;} .ts{fill:#b4b2a9;} }
</style>

<circle cx="74" cy="14" r="5" fill="#1D9E75"/>
<text class="ts" x="84" y="18">voiced</text>
<circle cx="150" cy="14" r="5" fill="#888780"/>
<text class="ts" x="160" y="18">ambient / silent</text>
<circle cx="286" cy="14" r="5" fill="#BA7517"/>
<text class="ts" x="296" y="18">deferred (de-risk track)</text>

<line x1="650.3" y1="46" x2="650.3" y2="300" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 3"/>
<text class="ts" x="648" y="40" text-anchor="end">strong-candidate ceiling 0.84</text>

<text class="t" x="70" y="62">Community route  ·  threshold 0.53</text>
<line x1="439.3" y1="74" x2="439.3" y2="110" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="4 3"/>
<text class="ts" x="439.3" y="70" text-anchor="middle">0.53</text>

<circle cx="159.5" cy="92" r="7" fill="#888780"/>
<circle cx="194.9" cy="92" r="7" fill="#888780"/>
<circle cx="303.2" cy="92" r="7" fill="#BA7517"/>
<circle cx="439.3" cy="92" r="7" fill="#1D9E75"/>
<circle cx="458.7" cy="92" r="7" fill="#1D9E75"/>
<circle cx="472.6" cy="92" r="7" fill="#1D9E75"/>

<line x1="465" y1="90" x2="544" y2="80" stroke="#B4B2A9" stroke-width="0.75"/>
<text class="ts" x="548" y="83">p018  0.58</text>
<line x1="462" y1="93" x2="544" y2="96" stroke="#B4B2A9" stroke-width="0.75"/>
<text class="ts" x="548" y="99">p041  0.56</text>

<text class="ts" x="159.5" y="113" text-anchor="middle">p044 0.13</text>
<text class="ts" x="207" y="79" text-anchor="middle">p043 0.18</text>
<text class="ts" x="303.2" y="113" text-anchor="middle">p045 0.34 · deferred</text>
<text class="ts" x="439.3" y="129" text-anchor="middle">p042 0.53 — the maybe (on the line)</text>

<line x1="194.9" y1="146" x2="439.3" y2="146" stroke="#888780" stroke-width="1"/>
<line x1="194.9" y1="142" x2="194.9" y2="150" stroke="#888780" stroke-width="1"/>
<line x1="439.3" y1="142" x2="439.3" y2="150" stroke="#888780" stroke-width="1"/>
<text class="ts" x="317" y="161" text-anchor="middle">≈ 0.35 gap — wide, well-conditioned</text>

<text class="t" x="70" y="200">Doorway route  ·  threshold 0.10</text>
<line x1="139.4" y1="212" x2="139.4" y2="248" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="4 3"/>
<text class="ts" x="139.4" y="208" text-anchor="middle">0.10</text>

<circle cx="95.0" cy="230" r="7" fill="#888780"/>
<circle cx="180.4" cy="230" r="7" fill="#1D9E75"/>

<text class="ts" x="180.4" y="216" text-anchor="middle">p004 0.16 — only voiced item</text>
<text class="ts" x="95" y="252" text-anchor="middle">p016 0.04 · silent (cross-route)</text>

<line x1="95" y1="272" x2="180.4" y2="272" stroke="#888780" stroke-width="1"/>
<line x1="95" y1="268" x2="95" y2="276" stroke="#888780" stroke-width="1"/>
<line x1="180.4" y1="268" x2="180.4" y2="276" stroke="#888780" stroke-width="1"/>
<text class="ts" x="137.7" y="287" text-anchor="middle">fit to one voiced point · compressed</text>

<line x1="70" y1="318" x2="660" y2="318" stroke="#888780" stroke-width="1"/>
<line x1="70" y1="318" x2="70" y2="324" stroke="#888780" stroke-width="1"/>
<line x1="208.8" y1="318" x2="208.8" y2="324" stroke="#888780" stroke-width="1"/>
<line x1="347.6" y1="318" x2="347.6" y2="324" stroke="#888780" stroke-width="1"/>
<line x1="486.5" y1="318" x2="486.5" y2="324" stroke="#888780" stroke-width="1"/>
<line x1="625.3" y1="318" x2="625.3" y2="324" stroke="#888780" stroke-width="1"/>
<text class="ts" x="70" y="335" text-anchor="middle">0</text>
<text class="ts" x="208.8" y="335" text-anchor="middle">0.2</text>
<text class="ts" x="347.6" y="335" text-anchor="middle">0.4</text>
<text class="ts" x="486.5" y="335" text-anchor="middle">0.6</text>
<text class="ts" x="625.3" y="335" text-anchor="middle">0.8</text>
<text class="ts" x="365" y="353" text-anchor="middle">v3 score →</text>
</svg>

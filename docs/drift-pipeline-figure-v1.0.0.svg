    <line x1="569" y1="233" x2="580" y2="233" stroke="#6b7686" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="738" y1="233" x2="749" y2="233" stroke="#6b7686" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>
  <!-- wrap -->
  <path d="M828,260 L828,270 L152,270 L152,280" fill="none" stroke="#c0c8d2" stroke-width="1.4" marker-end="url(#arr)"/>
  <!-- row 2 -->
  <g>
    <rect x="74" y="282" width="156" height="54" rx="8" fill="#ffffff" stroke="#9cc0e8"/><circle cx="94" cy="309" r="12" fill="#2862a6"/><text x="94" y="313" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">6</text><text x="114" y="313" font-size="12.5" font-weight="600" fill="#1b2632">Serious-Fact</text>
    <rect x="243" y="282" width="156" height="54" rx="8" fill="#ffffff" stroke="#9cc0e8"/><circle cx="263" cy="309" r="12" fill="#2862a6"/><text x="263" y="313" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">7</text><text x="283" y="313" font-size="12.5" font-weight="600" fill="#1b2632">Score / Route</text>
    <rect x="412" y="282" width="156" height="54" rx="8" fill="#fff7e9" stroke="#e0a94e" stroke-width="1.6"/><circle cx="432" cy="309" r="12" fill="#c4781a"/><text x="432" y="313" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">8</text><text x="452" y="313" font-size="12.5" font-weight="700" fill="#1b2632">Freshness </text><text x="528" y="313" font-size="12.5" font-weight="700" fill="#b5781c">&#9733;</text>
    <rect x="581" y="282" width="156" height="54" rx="8" fill="#ffffff" stroke="#9cc0e8"/><circle cx="601" cy="309" r="12" fill="#2862a6"/><text x="601" y="313" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">9</text><text x="621" y="313" font-size="12.5" font-weight="600" fill="#1b2632">Preflight</text>
    <rect x="750" y="282" width="156" height="54" rx="8" fill="#ffffff" stroke="#9cc0e8"/><circle cx="770" cy="309" r="12" fill="#2862a6"/><text x="770" y="305" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">10</text><text x="790" y="305" font-size="12.5" font-weight="600" fill="#1b2632">Session</text><text x="790" y="321" font-size="12.5" font-weight="600" fill="#1b2632">Program</text>
    <line x1="231" y1="309" x2="242" y2="309" stroke="#6b7686" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="400" y1="309" x2="411" y2="309" stroke="#6b7686" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="569" y1="309" x2="580" y2="309" stroke="#6b7686" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="738" y1="309" x2="749" y2="309" stroke="#6b7686" stroke-width="1.5" marker-end="url(#arr)"/>

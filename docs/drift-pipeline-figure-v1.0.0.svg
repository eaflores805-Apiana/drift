  <line x1="490" y1="366" x2="490" y2="386" stroke="#6b7686" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== PHASE 2 ===================== -->
  <rect x="60" y="388" width="860" height="94" rx="12" fill="#fff7ec" stroke="#d99a30" stroke-width="1.6"/>
  <text x="80" y="412" font-size="13" font-weight="700" fill="#b5781c">&#9313;  GIVE THE MODEL A SMALL, SAFE, WELL-FED JOB</text>
  <rect x="74" y="426" width="248" height="44" rx="8" fill="#ffffff" stroke="#e6bd7a"/><circle cx="96" cy="448" r="12" fill="#c4781a"/><text x="96" y="452" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">11</text><text x="116" y="452" font-size="12.5" font-weight="600" fill="#1b2632">Block Contract</text>
  <rect x="346" y="426" width="248" height="44" rx="8" fill="#ffffff" stroke="#e6bd7a"/><circle cx="368" cy="448" r="12" fill="#c4781a"/><text x="368" y="452" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">12</text><text x="388" y="452" font-size="12.5" font-weight="600" fill="#1b2632">Corks (selected libraries)</text>
  <rect x="618" y="426" width="288" height="44" rx="8" fill="#ffe6c0" stroke="#c4781a" stroke-width="2"/><circle cx="640" cy="448" r="12" fill="#c4781a"/><text x="640" y="452" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">13</text><text x="660" y="452" font-size="12" font-weight="700" fill="#1b2632">LINE GENERATION — the model speaks</text>
  <line x1="324" y1="448" x2="345" y2="448" stroke="#6b7686" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="596" y1="448" x2="617" y2="448" stroke="#6b7686" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="906" y="486" text-anchor="end" font-size="11" font-style="italic" fill="#9a7a3a">the only generative step — the wildcard</text>

  <line x1="490" y1="492" x2="490" y2="512" stroke="#6b7686" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== PHASE 3 ===================== -->
  <rect x="60" y="514" width="860" height="116" rx="12" fill="#eaf6ef" stroke="#4aa370" stroke-width="1.6"/>
  <text x="80" y="538" font-size="13" font-weight="700" fill="#2f8a52">&#9314;  REFUSE TO AIR ANYTHING THAT BREAKS TRUST</text>
  <rect x="74" y="552" width="156" height="54" rx="8" fill="#ffffff" stroke="#9ed3b4"/><circle cx="94" cy="579" r="12" fill="#2f8a52"/><text x="94" y="583" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">14</text><text x="114" y="583" font-size="12.5" font-weight="600" fill="#1b2632">Sanitize</text>
  <rect x="243" y="552" width="156" height="54" rx="8" fill="#d6f0e0" stroke="#2f8a52" stroke-width="2"/><circle cx="263" cy="579" r="12" fill="#2f8a52"/><text x="263" y="575" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">15</text><text x="283" y="575" font-size="12.5" font-weight="700" fill="#1b2632">Box 8a</text><text x="283" y="591" font-size="11.5" font-weight="600" fill="#37624a">grounding</text>
  <rect x="412" y="552" width="156" height="54" rx="8" fill="#d6f0e0" stroke="#2f8a52" stroke-width="2"/><circle cx="432" cy="579" r="12" fill="#2f8a52"/><text x="432" y="575" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">16</text><text x="452" y="575" font-size="12.5" font-weight="700" fill="#1b2632">Box 8b</text><text x="452" y="591" font-size="11.5" font-weight="600" fill="#37624a">treatment</text>
  <rect x="581" y="552" width="156" height="54" rx="8" fill="#ffffff" stroke="#9ed3b4"/><circle cx="601" cy="579" r="12" fill="#2f8a52"/><text x="601" y="583" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">17</text><text x="621" y="583" font-size="12.5" font-weight="600" fill="#1b2632">Fallback</text>
  <rect x="750" y="552" width="156" height="54" rx="8" fill="#ffffff" stroke="#9ed3b4"/><circle cx="770" cy="579" r="12" fill="#2f8a52"/><text x="770" y="575" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">18</text><text x="790" y="575" font-size="12.5" font-weight="600" fill="#1b2632">Exact-Text</text><text x="790" y="591" font-size="12.5" font-weight="600" fill="#1b2632">&#8594; TTS</text>
  <line x1="231" y1="579" x2="242" y2="579" stroke="#6b7686" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="579" x2="411" y2="579" stroke="#6b7686" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="569" y1="579" x2="580" y2="579" stroke="#6b7686" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="738" y1="579" x2="749" y2="579" stroke="#6b7686" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="490" y="622" text-anchor="middle" font-size="11" font-style="italic" fill="#3f7a58">the safety boundary — deterministic, fail-closed (a line can be true and still not airable)</text>

  <line x1="490" y1="630" x2="490" y2="650" stroke="#6b7686" stroke-width="2" marker-end="url(#arr)"/>

  <!-- OUTPUT -->
  <rect x="60" y="652" width="860" height="50" rx="10" fill="#16202e"/>
  <text x="490" y="682" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">&#9834;  music  &#8594;  short DJ moment  &#8594;  music  &#9834;     —  what the listener hears</text>
  <rect x="60" y="708" width="860" height="28" rx="7" fill="#f3eefb" stroke="#c3b1e0"/><text x="490" y="726" text-anchor="middle" font-size="11.5" font-weight="600" fill="#5a4a80">&#8862; 19  Ambient / Visual layer — cards under music (the grave cooldown governs this layer too)</text>

  <!-- CROSS-CUTTING -->
  <rect x="60" y="752" width="860" height="64" rx="10" fill="#f1f2f5" stroke="#aeb6c1" stroke-width="1.4" stroke-dasharray="2 3"/>
  <text x="80" y="772" font-size="12.5" font-weight="700" fill="#5a6675">CROSS-CUTTING  —  touches every stage at once</text>
  <rect x="80" y="780" width="196" height="28" rx="6" fill="#ffffff" stroke="#c7cdd6"/><text x="178" y="798" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2f3b49">Freshness / Decay &#9733;</text>
  <rect x="286" y="780" width="196" height="28" rx="6" fill="#ffffff" stroke="#c7cdd6"/><text x="384" y="798" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2f3b49">Cost / Cache &#9733;</text>
  <rect x="492" y="780" width="196" height="28" rx="6" fill="#ffffff" stroke="#c7cdd6"/><text x="590" y="798" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2f3b49">Pipeline Error-Handling</text>
  <rect x="698" y="780" width="208" height="28" rx="6" fill="#ffffff" stroke="#c7cdd6"/><text x="802" y="798" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2f3b49">Observability · 20 Log · 21 Eval</text>

  <!-- PERSISTENCE -->
  <rect x="60" y="826" width="860" height="64" rx="10" fill="#e9ebf0" stroke="#9aa3b0" stroke-width="1.4"/>
  <text x="80" y="846" font-size="12.5" font-weight="700" fill="#4a5563">PERSISTENCE  —  spans sessions, beneath all of it</text>
  <rect x="80" y="854" width="262" height="28" rx="6" fill="#ffffff" stroke="#bcc4cf"/><text x="211" y="872" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2f3b49">Cross-Session Memory &#9733;</text>
  <rect x="352" y="854" width="262" height="28" rx="6" fill="#ffffff" stroke="#bcc4cf"/><text x="483" y="872" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2f3b49">What-Aired History</text>
  <rect x="624" y="854" width="282" height="28" rx="6" fill="#ffffff" stroke="#bcc4cf"/><text x="765" y="872" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2f3b49">Listener Signals &#9733; (inbound)</text>

  <!-- FEEDBACK EDGE (right gutter) -->
  <path d="M906,309 C985,309 985,114 920,114" fill="none" stroke="#7c5cbf" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#arrFb)"/>
  <text x="998" y="200" font-size="11.5" font-weight="700" fill="#7c5cbf" transform="rotate(90 998 200)">&#9733; FEEDBACK EDGE</text>
  <text x="1016" y="200" font-size="10.5" fill="#7c5cbf" transform="rotate(90 1016 200)">Layer 2 &#8594; acquisition · prepare next, never generate-to-order</text>

  <!-- LISTENER SIGNAL (left gutter, inbound up) -->
  <path d="M60,868 C22,868 22,309 60,309" fill="none" stroke="#2a9d8f" stroke-width="2.2" stroke-dasharray="5 4" marker-end="url(#arrSig)"/>
  <text x="34" y="590" font-size="11" font-weight="700" fill="#2a9d8f" transform="rotate(-90 34 590)">&#9733; listener signals &#8594; pacing</text>

  <!-- LEGEND -->
  <text x="60" y="930" font-size="12" font-weight="700" fill="#3a4654">Legend</text>
  <text x="118" y="930" font-size="12" fill="#b5781c" font-weight="700">&#9733;</text><text x="132" y="930" font-size="12" fill="#3a4654">= a component a linear list can't show (the 5 additions)</text>
  <rect x="60" y="944" width="16" height="14" rx="3" fill="#ffe6c0" stroke="#c4781a"/><text x="84" y="956" font-size="12" fill="#3a4654">amber = the only generative step (the wildcard)</text>
  <rect x="440" y="944" width="16" height="14" rx="3" fill="#d6f0e0" stroke="#2f8a52"/><text x="464" y="956" font-size="12" fill="#3a4654">green = the safety boundary (deterministic, fail-closed)</text>
  <text x="60" y="980" font-size="11.5" font-style="italic" fill="#5b6675">Three jobs: ① decide what deserves attention · ② give the model a small safe job · ③ refuse to air anything that breaks trust — with memory beneath and cost beside.</text>
</svg>

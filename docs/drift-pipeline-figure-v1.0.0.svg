    <marker id="arrFb" markerWidth="10" markerHeight="10" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#7c5cbf"/></marker>
    <marker id="arrSig" markerWidth="10" markerHeight="10" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#2a9d8f"/></marker>
  </defs>

  <rect x="0" y="0" width="1100" height="1010" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="60" y="44" font-size="27" font-weight="700" fill="#16202e">Drift — The Complete Pipeline</text>
  <text x="60" y="72" font-size="13.5" fill="#5b6675">The listener hears only:  &#9834; music &#8594; short DJ moment &#8594; music &#9834;   —  everything below happens behind that.</text>

  <!-- SOURCES -->
  <rect x="60" y="92" width="860" height="44" rx="9" fill="#f6f8fb" stroke="#bcc6d2" stroke-width="1.5"/>
  <text x="490" y="119" text-anchor="middle" font-size="12.5" font-weight="600" fill="#3a4654">SOURCES  —  friends · local orgs · creators · followed brands · weather · local events · news · music context</text>
  <line x1="490" y1="138" x2="490" y2="166" stroke="#6b7686" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== PHASE 1 ===================== -->
  <rect x="60" y="168" width="860" height="198" rx="12" fill="#eef4fd" stroke="#5588cc" stroke-width="1.6"/>
  <text x="80" y="192" font-size="13" font-weight="700" fill="#2862a6">&#9312;  DECIDE WHAT DESERVES ATTENTION</text>

  <!-- row 1 -->
  <g>
    <rect x="74" y="206" width="156" height="54" rx="8" fill="#ffffff" stroke="#9cc0e8"/><circle cx="94" cy="233" r="12" fill="#2862a6"/><text x="94" y="237" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text><text x="114" y="237" font-size="12.5" font-weight="600" fill="#1b2632">Acquisition</text>
    <rect x="243" y="206" width="156" height="54" rx="8" fill="#ffffff" stroke="#9cc0e8"/><circle cx="263" cy="233" r="12" fill="#2862a6"/><text x="263" y="237" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text><text x="283" y="229" font-size="12.5" font-weight="600" fill="#1b2632">Permission /</text><text x="283" y="245" font-size="12.5" font-weight="600" fill="#1b2632">Provenance</text>
    <rect x="412" y="206" width="156" height="54" rx="8" fill="#ffffff" stroke="#9cc0e8"/><circle cx="432" cy="233" r="12" fill="#2862a6"/><text x="432" y="237" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text><text x="452" y="237" font-size="12.5" font-weight="600" fill="#1b2632">Normalize</text>
    <rect x="581" y="206" width="156" height="54" rx="8" fill="#ffffff" stroke="#9cc0e8"/><circle cx="601" cy="233" r="12" fill="#2862a6"/><text x="601" y="237" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text><text x="621" y="237" font-size="12.5" font-weight="600" fill="#1b2632">Meaning Pass</text>
    <rect x="750" y="206" width="156" height="54" rx="8" fill="#ffffff" stroke="#9cc0e8"/><circle cx="770" cy="233" r="12" fill="#2862a6"/><text x="770" y="237" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">5</text><text x="790" y="229" font-size="12.5" font-weight="600" fill="#1b2632">Allowed-</text><text x="790" y="245" font-size="12.5" font-weight="600" fill="#1b2632">Claims</text>
    <line x1="231" y1="233" x2="242" y2="233" stroke="#6b7686" stroke-width="1.5" marker-end="url(#arr)"/>
